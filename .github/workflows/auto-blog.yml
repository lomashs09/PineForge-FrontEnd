name: Auto-Generate Blog Post

on:
  schedule:
    # Monday, Wednesday, Friday at 8:07 AM UTC
    - cron: '7 8 * * 1,3,5'
  workflow_dispatch: # Manual trigger

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/auto_blog_generator.py

      - name: Build site
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "PineForge Bot"
          git config user.email "bot@getpineforge.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-generate blog post ($(date +%Y-%m-%d))"
          git push

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --yes --token=$VERCEL_TOKEN
